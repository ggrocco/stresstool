<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stresstool Controller</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<h1>Stresstool Controller</h1>
<p class="meta">Auto-refreshing every 2 s &mdash; or click Check Nodes to refresh now.</p>

<h2>Connected Nodes</h2>
<div id="nodes-list"><span class="no-nodes">Loading&hellip;</span></div>

<div class="actions">
  <button id="config-toggle" onclick="toggleConfig()">Edit Config</button>
  <button id="check-btn" onclick="refreshNodes()">Check Nodes</button>
  <button id="start-btn" onclick="startTests()" disabled>Start Tests</button>
  <button id="stop-btn" onclick="stopTests()" disabled>Stop Tests</button>
  <button id="exit-btn" class="exit-btn" onclick="exitController()">Exit Controller</button>
  <span id="status"></span>
</div>
<div id="config-panel" class="config-panel hidden">
  <div class="config-editor-wrap">
    <textarea id="config-editor" spellcheck="false" placeholder="# Paste or write your YAML config here&#10;tests:&#10;  - name: example&#10;    path: http://localhost:8080/api&#10;    method: GET&#10;    requests_per_second: 10&#10;    threads: 2&#10;    run_seconds: 5"></textarea>
    <div class="config-actions">
      <button id="save-config-btn" onclick="saveConfig()">Save Config</button>
      <span id="config-status"></span>
    </div>
  </div>
</div>
<h2>Logs</h2>
<div id="logs-panel" class="logs-panel">
  <pre id="logs-content"></pre>
</div>

<script src="/static/app.js"></script>
</body>
</html>
