syntax = "proto3";

package stresstool.v1;

option go_package = "stresstool/internal/protocol/payloadpb;payloadpb";

service StressTestService {
  rpc Session(stream NodeMessage) returns (stream ControllerMessage);
}

message NodeMessage {
  oneof payload {
    HelloMessage hello = 1;
    ReadyMessage ready = 2;
    ProgressMessage progress = 3;
    TestResultMessage test_result = 4;
    ErrorMessage error = 5;
  }
}

message ControllerMessage {
  oneof payload {
    TestSpecMessage test_spec = 1;
    StartTestsMessage start_tests = 2;
    CompleteMessage complete = 3;
    StopTestsMessage stop_tests = 4;
  }
}

message StopTestsMessage {
  string reason = 1;
}

message Config {
  repeated FuncDef funcs = 1;
  repeated Test tests = 2;
  AuthConfig auth = 3;
}

message AuthConfig {
  BasicAuthConfig basic_auth = 1;
  BearerAuthConfig bearer = 2;
  APIKeyAuthConfig api_key = 3;
  OAuth2ClientCredentialsConfig oauth2_client_credentials = 4;
  JWTAuthConfig jwt = 5;
}

// JWTAuthConfig carries JSON Web Token auth configuration. Header and payload
// are flat string key/value maps; numeric claims are coerced when the token
// is built.
message JWTAuthConfig {
  map<string, string> header = 1;
  map<string, string> payload = 2;
  JWTSignatureConfig signature = 3;
  int32 ttl_seconds = 4;
}

message JWTSignatureConfig {
  string secret = 1;
}

message BasicAuthConfig {
  string username = 1;
  string password = 2;
}

message BearerAuthConfig {
  string token = 1;
}

message APIKeyAuthConfig {
  string header = 1;
  string key = 2;
}

message OAuth2ClientCredentialsConfig {
  string token_url = 1;
  string client_id = 2;
  string client_secret = 3;
  repeated string scopes = 4;
}

message FuncDef {
  string name = 1;
  repeated string cmd = 2;
}

message Test {
  string name = 1;
  string path = 2;
  string method = 3;
  int32 requests_per_second = 4;
  int32 threads = 5;
  int32 run_seconds = 6;
  map<string, string> headers = 7;
  string body = 8;
  Assertion assert = 9;
  map<string, NodeOverride> nodes = 10;
  bool auth_disabled = 11;
  int32 warmup_seconds = 12;
  repeated Step steps = 13;
}

message Step {
  string name = 1;
  string path = 2;
  string method = 3;
  map<string, string> headers = 4;
  string body = 5;
  Assertion assert = 6;
}

message NodeOverride {
  int32 requests_per_second = 1;
  int32 threads = 2;
  int32 warmup_seconds = 3;
}

message Assertion {
  int32 status_code = 1;
  string body_contains = 2;
  string body_equals = 3;
  string body_not_equals = 4;
  int32 max_latency_ms = 5;
}

message HelloMessage {
  string node_name = 1;
  string version = 2;
}

message TestSpecMessage {
  Config config = 1;
  string node_name = 2;
  bool parallel = 3;
}

message ProgressMessage {
  string node_name = 1;
  string test_name = 2;
  double elapsed_seconds = 3;
  int64 total_requests = 4;
  int64 failures = 5;
  double rps = 6;
  bool done = 7;
}

message TestResultMessage {
  string node_name = 1;
  string test_name = 2;
  TestResult result = 3;
}

message TestResult {
  Test test = 1;
  Metrics metrics = 2;
  Assertions assertions = 3;
  bool passed = 4;
  repeated string errors = 5;
  bool stopped_early = 6;
}

message Assertions {}

message Metrics {
  int64 total_requests = 1;
  int64 success_count = 2;
  int64 failure_count = 3;
  int64 assertion_failures = 4;
  repeated int64 latencies_nanos = 5;
  map<int32, int64> status_codes = 6;
  map<string, int64> errors = 7;
}

message ReadyMessage {
  string node_name = 1;
}

message StartTestsMessage {
  int64 timestamp = 1;
}

message ErrorMessage {
  string node_name = 1;
  string error = 2;
  string phase = 3;
}

message CompleteMessage {}
