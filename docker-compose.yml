# Distributed stresstool: controller + two nodes over gRPC (plaintext).
#
# Default (manual start): open http://localhost:8091 and click Start.
#   docker compose up --build
#
# Auto-start via web API (optional profile):
#   docker compose --profile auto-start up --build
#
# Controller: gRPC :8090, web UI :8091. With profile `auto-start`, the starter
# waits 15s, POSTs /api/start, polls /api/run-status until the run finishes, then
# POSTs /api/exit so the controller shuts down (nodes disconnect).
#
services:
  controller:
    build: .
    image: stresstool:local
    command:
      - controller
      - -f
      - /config/config.yaml
      - --listen
      - :8090
      - --web
      - --web-port
      - "8091"
      - --insecure
    environment:
      # Fixed token so the auto-start profile (and anyone signing in via the
      # browser during local dev) can authenticate. Override with any value.
      STRESSTOOL_WEB_TOKEN: "${STRESSTOOL_WEB_TOKEN:-local-dev-token}"
    volumes:
      - ./docker/compose-config.yaml:/config/config.yaml:ro
    ports:
      - "8090:8090"
      - "8091:8091"
    restart: "no"

  node-a:
    build: .
    image: stresstool:local
    depends_on:
      - controller
    command:
      - node
      - --node-name
      - node-a
      - --controller
      - controller:8090
      - --insecure
    restart: "no"

  node-b:
    build: .
    image: stresstool:local
    depends_on:
      - controller
    command:
      - node
      - --node-name
      - node-b
      - --controller
      - controller:8090
      - --insecure
    restart: "no"

  starter:
    profiles:
      - auto-start
    image: curlimages/curl:8.6.0
    depends_on:
      - controller
      - node-a
      - node-b
    environment:
      STRESSTOOL_WEB_TOKEN: "${STRESSTOOL_WEB_TOKEN:-local-dev-token}"
    command:
      - sh
      - -c
      - |
        set -e
        AUTH="Authorization: Bearer $$STRESSTOOL_WEB_TOKEN"
        echo "Waiting for controller web UI and nodes..."
        sleep 15
        echo "POST /api/start"
        curl -sfS -H "$$AUTH" -X POST "http://controller:8091/api/start"
        echo ""
        echo "Waiting for run to start..."
        i=0
        while ! curl -sfS -H "$$AUTH" "http://controller:8091/api/run-status" | grep -q '"run_active":true'; do
          sleep 1
          i=$((i + 1))
          if [ "$i" -gt 120 ]; then echo "timeout waiting for run_active"; exit 1; fi
        done
        echo "Run active; waiting for completion..."
        while curl -sfS -H "$$AUTH" "http://controller:8091/api/run-status" | grep -q '"run_active":true'; do
          sleep 2
        done
        echo "POST /api/exit"
        curl -sfS -H "$$AUTH" -X POST "http://controller:8091/api/exit"
        echo ""
        echo "Exit sent; controller is shutting down."

networks:
  default:
    name: stresstool-compose
