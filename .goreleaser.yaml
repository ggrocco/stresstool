version: 2

builds:
  - main: ./cmd/stresstool
    binary: stresstool
    ldflags:
      - -s -w
      - -X stresstool/internal/version.Version={{.Version}}
      - -X stresstool/internal/version.Commit={{.Commit}}
      - -X stresstool/internal/version.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: stresstool
  draft: false
  prerelease: auto
