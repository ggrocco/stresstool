funcs:
  - name: get_password
    cmd: ["echo", "test-password-12345"]

# Auth configuration: only one type allowed per config file.
# All tests use it automatically unless a test sets "auth: false".
# Supported types (jwt is the recommended, most widely-used credential):
#   jwt, basic_auth, bearer, api_key, oauth2_client_credentials
#
# ---- JWT (recommended) ---------------------------------------------
# The "header" and "payload" blocks are merged on top of these defaults, so
# you only need to override what you care about:
#   header  defaults: {alg: HS256, typ: JWT}
#   payload defaults: {iat: <now-unix>, exp: <now+ttl-unix>}  (ttl defaults to 3600s)
# String values inside either block go through the normal placeholder
# pipeline, so {{ uuid() }}, {{ now() }}, {{ funcname() }}, and
# {{ js('...') }} all work. Supported algorithms: HS256, HS384, HS512.
#
# auth:
#   jwt:
#     header:
#       alg: HS256          # override any of the defaults
#       kid: my-key-id
#     payload:
#       iss: stresstool
#       sub: load-test-user
#       aud: my-api
#       jti: "{{ uuid() }}"
#     signature:
#       secret: "{{ get_password() }}"
#     ttl_seconds: 600       # optional; default 3600

auth:
  basic_auth:
    username: "testuser"
    password: "{{ get_password() }}"

tests:
  - name: api_login_test
    path: "https://httpbin.org/post"
    method: "POST"
    requests_per_second: 5
    threads: 2
    run_seconds: 10

    # Auth headers (Authorization: Basic ...) are added automatically.
    headers:
      X-Request-Id: "{{ uuid() }}"
      X-Timestamp: "{{ now() }}"
      Content-Type: "application/json"

    body: >
      {
        "username": "testuser",
        "timestamp": "{{ now() }}"
      }

    assert:
      status_code: 200
      body_contains: "json"
      body_not_equals: "error"
      max_latency_ms: 2000

    nodes:
      node-a:
        requests_per_second: 3
        threads: 1
      node-b:
        requests_per_second: 8

  - name: api_get_public
    path: "https://httpbin.org/get"
    method: "GET"
    auth: false  # Disable auth for this test
    requests_per_second: 10
    threads: 3
    run_seconds: 5

    headers:
      X-Request-Id: "{{ uuid() }}"

    assert:
      status_code: 200
      max_latency_ms: 1000

  # Multi-step test: each worker runs the steps sequentially, then loops.
  # threads, requests_per_second and run_seconds apply to the whole test.
  # requests_per_second gates individual step requests (5 rps with 3 steps
  # means ~1.67 full iterations/sec, 5 HTTP requests/sec total).
  # Per-step path/method/headers/body/assert replace the test-level fields,
  # which cannot be combined with `steps`.
  - name: api_checkout_flow
    auth: false
    requests_per_second: 5
    threads: 2
    run_seconds: 10

    steps:
      - name: list_products
        path: "https://httpbin.org/get"
        method: "GET"
        headers:
          X-Request-Id: "{{ uuid() }}"
        assert:
          status_code: 200
          max_latency_ms: 1500

      - name: create_cart
        path: "https://httpbin.org/post"
        method: "POST"
        headers:
          Content-Type: "application/json"
        body: >
          { "items": ["sku-1", "sku-2"], "ts": "{{ now() }}" }
        assert:
          status_code: 200
          body_contains: "items"

      - name: checkout
        path: "https://httpbin.org/post"
        method: "POST"
        headers:
          Content-Type: "application/json"
        body: >
          { "payment": "card", "ts": "{{ now() }}" }
        assert:
          status_code: 200
          max_latency_ms: 2000

